    <script>
window.addEventListener("load", function () {
  document.body.addEventListener("click", function (e) {
    const el = e.target;

    // catches buttons, links, and elements inside them
    if (el.closest("button, a")) {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }
  });
});
</script>
