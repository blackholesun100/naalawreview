document.addEventListener("DOMContentLoaded", function () {
  // select ALL buttons and links in footer (or bottom area)
  const footerButtons = document.querySelectorAll("footer button, footer a");

  footerButtons.forEach(el => {
    el.addEventListener("click", () => {
      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    });
  });
});
</script>
